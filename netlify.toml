[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# React Router owns application routes. Netlify must serve the SPA shell when
# a visitor refreshes or directly opens a private route such as /app/customers.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Mobile browsers commonly restore old tabs from memory. Force the application
# shell and former service-worker URL to revalidate while keeping hashed assets
# available through Netlify's normal immutable caching.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Always revalidate route responses so a deployment cannot retain an older
# HTML/CSS asset map. Fingerprinted build assets remain safely immutable.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data: https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.cartocdn.com; manifest-src 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Permitted-Cross-Domain-Policies = "none"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
